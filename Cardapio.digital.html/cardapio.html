<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cardápio Digital</title>

 <style>

*{
    box-sizing: border-box;
}

body{
    margin:0;
    min-height:100vh;
    text-align:center;
    font-family:Arial, Helvetica, sans-serif;
    background:linear-gradient(135deg,#ffcc70,#ff8177);
}


h1{
    color:white;
    font-size:45px;
    text-shadow:2px 2px 5px #333;
    margin-top:40px;
}


/* Área dos campos */

input{

    width:220px;
    padding:12px;
    margin:8px;

    border:none;
    border-radius:25px;

    font-size:16px;

    outline:none;

    box-shadow:0 3px 8px rgba(0,0,0,0.2);

}


input:focus{

    transform:scale(1.05);
    border:2px solid chocolate;

}


/* Organização dos produtos */

#cardapio{

    display:flex;
    justify-content:center;
    flex-wrap:wrap;
    gap:25px;

    margin-top:30px;

}


/* Cartão do produto */

.card{

    background:white;

    width:280px;

    padding:25px;

    border-radius:20px;

    box-shadow:
    0 10px 20px rgba(0,0,0,0.25);

    transition:0.3s;

}


.card:hover{

    transform:translateY(-10px);

}


/* Nome do produto */

.card h2{

    color:#e85d04;

    font-size:28px;

}


/* Preço */

.card p:first-of-type{

    color:green;

    font-size:22px;

    font-weight:bold;

}


/* Categoria */

.card p:last-of-type{

    background:#eee;

    display:inline-block;

    padding:8px 20px;

    border-radius:20px;

}


button{
      cursor: pointer;
      
    background:#e85d04;

    color:white;

    border:none;

    padding:12px 25px;

    border-radius:25px;

    cursor:pointer;

    font-size:16px;

}


button:hover{

    background:#9d0208;

}

</style>
</head>

<body>

    <h1>🍔 Cardápio Digital 🍔</h1>

    <input type="text" id="nome" placeholder="Nome do lanche">
    <input type="number"id="preco" placeholder="Preco">
    <input type="text"id="categoria" placeholder="Categoria">
    <button onclick="adicionaritem()">Adicionar Item</button>



    <div id="cardapio"></div>


    <script>

        let produtos = [
            {
                nome: "X-Burguer",
                preco: 19.50,
                categoria: "Lanche"
            },
            {
                nome: "Pizza",
                preco: 120.50,
                categoria: "Lanche"
            }
        ];


        function listarprodutos(){

            let cardapio = document.getElementById("cardapio");

            cardapio.innerHTML = "";


            for(let i = 0; i < produtos.length; i++){

                cardapio.innerHTML += 
                "<div class='card'>" +
                    "<h2>" + produtos[i].nome + "</h2>" +
                    "<p>Preço: R$ " + produtos[i].preco.toFixed(2) + "</p>" +
                    "<p>Categoria: " + produtos[i].categoria + "</p>" +
                "</div>";

            }

        }


        listarprodutos();

        function adicionaritem(){
            let nome = document.getElementById("nome").value;
            let preco = document.getElementById("preco").value;
            let categoria = document.getElementById("categoria").value;

            produtos.push({
                nome: nome,
                preco: preco,
                categoria: categoria
            });

            listarprodutos();

              document.getElementById("nome").value = ""
            document.getElementById("preco").value =""
            document.getElementById("categoria").value = ""


        }


    </script>

</body>
</html>
